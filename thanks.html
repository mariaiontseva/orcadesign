<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief Received — OrcaDesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
            color: var(--white);
            text-align: center;
            padding: 40px 24px;
        }
        .thanks-inner h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .thanks-inner p {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--gray-400);
            font-weight: 300;
            max-width: 480px;
            margin: 0 auto 32px;
        }
        .thanks-inner a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 500;
        }
        .thanks-inner a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="thanks-page">
        <div class="thanks-inner">
            <h1>Brief received</h1>
            <p>Tell us about your product and where you want to take it. We'll get back to you within 24 hours with a proposal.</p>
            <a href="/">← Back to OrcaDesign</a>
        </div>
    </div>
</body>
</html>
